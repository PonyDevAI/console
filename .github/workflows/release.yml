name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            os_name: linux
            arch_name: amd64
            use_cross: "false"
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            os_name: linux
            arch_name: arm64
            use_cross: "true"
          - target: x86_64-apple-darwin
            os: macos-latest
            os_name: darwin
            arch_name: amd64
            use_cross: "false"
          - target: aarch64-apple-darwin
            os: macos-latest
            os_name: darwin
            arch_name: arm64
            use_cross: "false"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross == 'true'
        run: cargo install cross --locked

      - name: Build backend
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          NAME="console-${TAG}-${{ matrix.os_name }}-${{ matrix.arch_name }}"
          mkdir -p package/dashboard
          cp "target/${{ matrix.target }}/release/console" package/console
          cp -r web/dist package/dashboard/dist
          tar -czf "${NAME}.tar.gz" -C package console dashboard

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: console-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum console-*.tar.gz > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            console-*.tar.gz
            SHA256SUMS
